<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow-x: hidden;
    }

    .container {
        padding: 40px 20px;
    }

    h1 {
        font-size: 2.5rem;
        color: white;
        animation: glow 2s infinite alternate;
    }

    p {
        font-size: 1.2rem;
        color: white;
        margin: 20px 0;
    }

    button {
        padding: 12px 25px;
        font-size: 1rem;
        border: none;
        border-radius: 25px;
        background-color: #fff;
        color: #ff4e50;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff4e50;
        color: white;
        transform: scale(1.1);
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff, 0 0 20px #ff4e50; }
        to { text-shadow: 0 0 20px #fff, 0 0 30px #ff1c68; }
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {
        h1 {
            font-size: 2rem;
        }
        p {
            font-size: 1rem;
        }
    }
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
    <h1>🎂 Happy Birthday! 🎉</h1>
    <p>Wishing you a day filled with love, laughter, and happiness! 💖</p>
    <button onclick="startConfetti()">Celebrate 🎊</button>
</div>

<script>
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function randomColor() {
    const colors = ["#ff0a54","#ff477e","#ff7096","#ff85a1","#fbb1bd","#00f5d4","#9b5de5","#f15bb5"];
    return colors[Math.floor(Math.random() * colors.length)];
}

function createConfetti() {
    for (let i = 0; i < 150; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            r: Math.random() * 6 + 2,
            d: Math.random() * 150,
            color: randomColor(),
            tilt: Math.floor(Math.random() * 10) - 10
        });
    }
}

function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confetti.forEach((c, i) => {
        ctx.beginPath();
        ctx.fillStyle = c.color;
        ctx.fillRect(c.x, c.y, c.r, c.r);
    });

    updateConfetti();
}

function updateConfetti() {
    confetti.forEach((c, i) => {
        c.y += Math.cos(c.d) + 3;
        c.x += Math.sin(c.d);

        if (c.y > canvas.height) {
            confetti[i] = {
                x: Math.random() * canvas.width,
                y: -10,
                r: c.r,
                d: c.d,
                color: c.color,
                tilt: c.tilt
            };
        }
    });
}

function startConfetti() {
    confetti = [];
    createConfetti();
    setInterval(drawConfetti, 20);
}

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
